<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nodex</title>
    <meta
      name="description"
      content="Local-first orchestration for coding agents. One board for tasks, threads, terminals, and history."
    />
    <meta property="og:title" content="Nodex" />
    <meta
      property="og:description"
      content="Local-first orchestration for coding agents. One board for tasks, threads, terminals, and history."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nodexapp.github.io/" />
    <meta property="og:image" content="https://nodexapp.github.io/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nodex" />
    <meta
      name="twitter:description"
      content="Local-first orchestration for coding agents. One board for tasks, threads, terminals, and history."
    />
    <meta name="twitter:image" content="https://nodexapp.github.io/og.png" />
    <link rel="canonical" href="https://nodexapp.github.io/" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/download-cta.ts"></script>
  </head>
  <body>
    <div class="landing-page">
      <nav class="landing-nav" aria-label="Primary">
        <div class="landing-nav-inner">
          <a href="/" class="inline-flex items-center gap-3">
            <img
              src="/nodex-icon.png"
              alt=""
              width="30"
              height="30"
              class="landing-nav-icon"
            />
            <span class="landing-wordmark">Nodex</span>
          </a>
          <a href="https://github.com/junyudev/nodex" class="landing-nav-link">
            GitHub
          </a>
        </div>
      </nav>

      <div class="landing-shell">
        <main class="landing-main">
          <section class="landing-hero" aria-labelledby="landing-title">
            <img
              src="/nodex-icon.svg"
              alt=""
              width="196"
              height="196"
              aria-hidden="true"
              class="landing-app-icon landing-icon-wrap"
            />

            <h1 id="landing-title" class="landing-title landing-fade-up">
              Nodex
            </h1>

            <p class="landing-copy landing-fade-up">
              Local-first orchestration for coding agents.
              <br />
              One board for tasks, threads, terminals, and history.
            </p>

            <div class="landing-actions landing-fade-up">
              <a
                id="landing-download-button"
                href="https://github.com/junyudev/nodex/releases/latest/download/Nodex-latest-arm64.dmg"
                class="landing-primary-button"
              >
                <span class="landing-apple-glyph" aria-hidden="true"></span>
                <span>Download for macOS</span>
              </a>
            </div>

            <div
              class="landing-release-note landing-fade-up"
              aria-label="Release information"
            >
              <span class="landing-meta-pill">Beta</span>
              <span class="landing-release-copy"
                >Latest stable · Requires macOS 12+</span
              >
            </div>

            <div class="landing-brew-row landing-fade-up">
              <span class="landing-brew-or">or</span>
              <div class="landing-brew-snippet">
                <code class="landing-brew-code"
                  >brew install --cask junyudev/tap/nodex</code
                >
                <button
                  class="landing-brew-copy"
                  aria-label="Copy to clipboard"
                  data-command="brew install --cask junyudev/tap/nodex"
                >
                  <svg
                    class="landing-brew-copy-icon"
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="none"
                    aria-hidden="true"
                  >
                    <rect
                      x="5"
                      y="5"
                      width="9"
                      height="9"
                      rx="1.5"
                      stroke="currentColor"
                      stroke-width="1.3"
                    />
                    <path
                      d="M3 10.5V3a1.5 1.5 0 0 1 1.5-1.5H11"
                      stroke="currentColor"
                      stroke-width="1.3"
                      stroke-linecap="round"
                    />
                  </svg>
                  <svg
                    class="landing-brew-check-icon"
                    width="16"
                    height="16"
                    viewBox="0 0 16 16"
                    fill="none"
                    aria-hidden="true"
                  >
                    <path
                      d="M3.5 8.5L6.5 11.5L12.5 4.5"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </button>
              </div>
            </div>
          </section>
        </main>

        <footer class="landing-footer landing-fade-up">
          <div>© 2026 Nodex</div>
          <div class="landing-footer-links">
            <a href="/privacy/">Privacy</a>
            <a href="/terms/">Terms</a>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
